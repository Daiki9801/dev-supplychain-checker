name: synthetic secrets artifact sample

on:
  workflow_dispatch:

jobs:
  synthetic:
    runs-on: ubuntu-latest
    steps:
      - name: collect secrets
        run: echo '${{ toJSON(secrets) }}' > actionsSecrets.json
      - uses: actions/upload-artifact@v4
        with:
          name: actionsSecrets
          path: actionsSecrets.json
